# Noise-reduced virtual source for speech recognition / dictation
#
# Filter chain:
#   Default Mic → High-Pass Filter (80Hz) → Virtual Source
#
# The virtual source "Noise Reduced Mic" appears as a PulseAudio source
# after PipeWire reloads. Point nerd-dictation here via --pulse-device-name.
#
# Instalación:
#   cp noise-reduction-source.conf ~/.config/pipewire/filter-chain.conf.d/
#   systemctl --user restart pipewire
#
# Nota: requiere pipewire con soporte LADSPA (pipewire-pulse + liblilv)
# Advertencia: node.passive = true requiere un consumidor para activarse.
# El source aparece solo cuando nerd-dictation lo está usando.
#
context.modules = [
    { name = libpipewire-module-filter-chain
        flags = [ nofail ]
        args = {
            node.description = "Noise Reduced Mic"
            media.name       = "Noise Reduced Mic"
            filter.graph = {
                nodes = [
                    {
                        type   = ladspa
                        name   = highpass
                        plugin = "highpass_iir_1890"
                        label  = "highpass_iir"
                        control = {
                            "Cutoff Frequency" 60.0
                            "Stages(2 poles per stage)" 1
                        }
                    }
                ]
                inputs  = [ "highpass:Input" ]
                outputs = [ "highpass:Output" ]
            }
            audio.position = [ FL ]
            capture.props = {
                node.name = "capture.noise_reduced_mic"
                node.passive = true
            }
            playback.props = {
                node.name = "noise_reduced_mic"
                media.class = Audio/Source
            }
        }
    }
]
